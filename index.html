<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مواهب الشباب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- favicon (will show in browser tabs) -->
    <link rel="icon" type="image/png" href="/logo.png">
    <!-- Open Graph / Social preview (replace example URLs with your real site URL and image) -->
    <meta property="og:title" content="اكتشف موهبتك">
    <meta property="og:description" content="سجل بياناتك وموهبتك وانضم لقطاع شباب ثانوي">
    <!-- IMPORTANT: use an absolute URL to the hosted image (recommended size 1200x630) -->
    <meta property="og:image" content="https://your-domain.com/logo.png">
    <meta property="og:url" content="https://your-domain.com/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="اكتشف موهبتك">
    <meta name="twitter:description" content="سجل بياناتك وموهبتك وانضم لقطاع شباب ثانوي">
    <meta name="twitter:image" content="https://your-domain.com/logo.png">
        <!-- JSON-LD (structured data) - replace URLs with your absolute site URL -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "اكتشف موهبتك",
            "url": "https://your-domain.com/",
            "logo": "https://your-domain.com/logo.png"
        }
        </script>
</head>
<body>
    <div class="container">
        <div class="card form-card" id="registration-card">
            <div class="header">
                <div class="logo">
                    <img src="logo.png" alt="لوجو مواهب " class="logo-img">
                </div>
                <div class="header-content">
                    <h1>🌟 اكتشف موهبتك</h1>
                    <p>سجل بياناتك وموهبتك وانضم لقطاع شباب ثانوي</p>
                </div>
            </div>
            
            <form id="talent-form">
                <div class="input-group">
                    <label for="name">الاسم الثلاثي</label>
                    <input type="text" id="name" class="small-input" required placeholder="أدخل اسمك هنا">
                </div>

                <div class="input-group">
                    <label for="year">السنة الدراسية</label>
                    <select id="year" required>
                        <option value="" disabled selected>اختر السنة الدراسية</option>
                        <option value="أولى ثانوي">أولى ثانوي</option>
                        <option value="ثانية ثانوي">ثانية ثانوي</option>
                        <option value="ثالثة ثانوي">ثالثة ثانوي</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="talent">موهبتك الأساسية</label>
                    <input type="text" id="talent" class="small-input" required placeholder="مثال: البرمجة، الرسم، كرة القدم، الشعر...">
                </div>

                <div class="input-group">
                    <label for="phone">رقم التليفون</label>
                    <input type="tel" id="phone" required placeholder="01xxxxxxxxx">
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn">سجل الآن <span class="spinner" id="spinner"></span></button>
                </div>
            </form>
        </div>

        <div class="card success-card hidden" id="success-card">
            <div class="success-icon">✅</div>
            <h2>تم التسجيل بنجاح!</h2>
            <p>أهلاً بيك معانا يا فنان، خطوتك الجاية إنك تدخل جروب الواتساب الخاص بينا.</p>
            <a href="https://chat.whatsapp.com/FraAtLG0n04EhuG8cQve7L" target="_blank" class="whatsapp-btn">
                دخول جروب الواتساب 💬
            </a>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <footer class="site-footer">
        <div class="footer-inner">
            <a href="https://www.facebook.com/share/1FQMmP3FXf/" target="_blank" rel="noopener noreferrer" class="footer-link">
                <!-- Facebook SVG icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M22 12.07C22 6.48 17.52 2 11.93 2 6.34 2 1.86 6.48 1.86 12.07c0 4.99 3.66 9.13 8.44 9.89v-6.99h-2.54v-2.9h2.54V9.41c0-2.5 1.49-3.88 3.77-3.88 1.09 0 2.23.2 2.23.2v2.45h-1.26c-1.24 0-1.62.77-1.62 1.56v1.87h2.76l-.44 2.9h-2.32v6.99c4.78-.76 8.44-4.9 8.44-9.89z" fill="#1877F2"/>
                </svg>
                <span class="footer-credit">بواسطة أبانوب</span>
            </a>
        </div>
    </footer>
</body>
</html>
