<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مواهب الشباب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- favicon (will show in browser tabs) -->
    <link rel="icon" type="image/png" href="/logo.png">
    <!-- Open Graph / Social preview (replace example URLs with your real site URL and image) -->
    <meta property="og:title" content="اكتشف موهبتك">
    <meta property="og:description" content="سجل بياناتك وموهبتك وانضم لمجتمع إبداع شباب كفر الشيخ">
    <meta property="og:image" content="https://pepo2024.github.io/MAWAHEB/logo.png">
    <meta property="og:url" content="https://pepo2024.github.io/MAWAHEB/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="اكتشف موهبتك">
    <meta name="twitter:description" content="سجل بياناتك وموهبتك وانضم لمجتمع إبداع شباب كفر الشيخ">
    <meta name="twitter:image" content="https://pepo2024.github.io/MAWAHEB/logo.png">
        <!-- JSON-LD (structured data) - replace URLs with your absolute site URL -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "اكتشف موهبتك",
            "url": "https://your-domain.com/",
            "logo": "https://your-domain.com/logo.png"
        }
        </script>
</head>
<body>
    <div class="container">
        <div class="card form-card" id="registration-card">
            <div class="header">
                <div class="logo">
                    <img src="logo.png" alt="لوجو مواهب " class="logo-img">
                </div>
                <div class="header-content">
                    <h1>🌟 اكتشف موهبتك</h1>
                    <p>سجل بياناتك وموهبتك وانضم لقطاع شباب ثانوي</p>
                </div>
            </div>
            
            <form id="talent-form">
                <div class="input-group">
                    <label for="name">الاسم الثلاثي</label>
                    <input type="text" id="name" required placeholder="أدخل اسمك هنا">
                </div>

                <div class="input-group">
                    <label for="talent">موهبتك الأساسية</label>
                    <input type="text" id="talent" required placeholder="مثال: البرمجة، الرسم، كرة القدم، الشعر...">
                </div>

                <div class="input-group">
                    <label for="phone">رقم التليفون</label>
                    <input type="tel" id="phone" required placeholder="01xxxxxxxxx">
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn">سجل الآن <span class="spinner" id="spinner"></span></button>
                </div>
            </form>
        </div>

        <div class="card success-card hidden" id="success-card">
            <div class="success-icon">✅</div>
            <h2>تم التسجيل بنجاح!</h2>
            <p>أهلاً بيك معانا يا فنان، خطوتك الجاية إنك تدخل جروب الواتساب الخاص بينا.</p>
            <a href="https://chat.whatsapp.com/FraAtLG0n04EhuG8cQve7L" target="_blank" class="whatsapp-btn">
                دخول جروب الواتساب 💬
            </a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
