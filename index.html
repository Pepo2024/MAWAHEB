<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مواهب الشباب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card form-card" id="registration-card">
            <div class="header">
                <h1>🌟 اكتشف موهبتك</h1>
                <p>سجل بياناتك وموهبتك وانضم لقطاع شباب ثانوي</p>
            </div>
            
            <form id="talent-form">
                <div class="input-group">
                    <label for="name">الاسم الثلاثي</label>
                    <input type="text" id="name" required placeholder="أدخل اسمك هنا">
                </div>
                <div class="input-group">
                    <label for="phone">رقم التليفون</label>
                    <input type="tel" id="phone" required placeholder="01xxxxxxxxx">
                </div>
                <div class="input-group">
                    <label for="talent">موهبتك الأساسية</label>
                    <input type="text" id="talent" required placeholder="مثال: البرمجة، الرسم، كرة القدم، الشعر...">
                </div>
                
                <button type="submit" id="submit-btn">سجل الآن <span class="spinner" id="spinner"></span></button>
            </form>
        </div>

        <div class="card success-card hidden" id="success-card">
            <div class="success-icon">✅</div>
            <h2>تم التسجيل بنجاح!</h2>
            <p>أهلاً بيك معانا يا فنان، خطوتك الجاية إنك تدخل جروب الواتساب الخاص بينا.</p>
            <a href="https://chat.whatsapp.com/FraAtLG0n04EhuG8cQve7L" target="_blank" class="whatsapp-btn">
                دخول جروب الواتساب 💬
            </a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
